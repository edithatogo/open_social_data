name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test

  maintenance:
security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  license-deny:
    name: License / Policy Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  nextest:
    name: Nextest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo install cargo-nextest --locked
      - run: cargo nextest run

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

  build-release:
    name: Maintenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements.txt
      - run: python scripts/maintenance_check.py

build-release:
    name: Build Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, fmt, clippy, test, maintenance, security-audit, license-deny, nextest, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - name: Release dry-run check (no publish)
        run: |
          echo "Release build successful for ${{ github.ref_name }}"
          echo "Dry-run: no artifacts published without explicit approval"
      - uses: actions/upload-artifact@v4
        with:
          name: open-social-data-cli-${{ github.ref_name }}
          path: target/release/open-social-data-cli
  build-release:
    name: Build Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, fmt, clippy, test, maintenance]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: open-social-data-cli-${{ github.ref_name }}
          path: target/release/open-social-data-cli
